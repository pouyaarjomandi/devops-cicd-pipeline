services:
  jenkins:
    build:
      context: .
      dockerfile: jenkins/Dockerfile
    image: local/jenkins-with-docker-python:lts
    container_name: jenkins
    restart: unless-stopped
    ports:
      - "8080:8080"
      - "50000:50000"
    volumes:
      - jenkins_home:/var/jenkins_home
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - cicd

  nexus:
    image: sonatype/nexus3:3.90.2-ubi
    container_name: nexus
    restart: unless-stopped
    ports:
      - "8081:8081"
      - "8083:8083"
    volumes:
      - nexus_data:/nexus-data
    networks:
      - cicd

volumes:
  jenkins_home:
  nexus_data:

networks:
  cicd:
    driver: bridge